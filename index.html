<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purrfect tang- Dog Breed Blog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeInDown 1s ease;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .search-bar {
            max-width: 600px;
            margin: 30px auto;
            position: relative;
            animation: fadeIn 1.5s ease;
        }

        .search-bar input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            border: none;
            border-radius: 50px;
            font-size: 1em;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .search-bar input:focus {
            outline: none;
            transform: scale(1.02);
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2em;
            color: #667eea;
        }

        .filters {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            animation: fadeIn 2s ease;
        }

        .filter-btn {
            padding: 10px 25px;
            border: 2px solid white;
            background: rgba(255,255,255,0.2);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
            backdrop-filter: blur(10px);
        }

        .filter-btn:hover, .filter-btn.active {
            background: white;
            color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            animation: fadeInUp 1s ease;
        }

        .blog-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .blog-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .blog-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .blog-card:hover .blog-image {
            transform: scale(1.1);
        }

        .blog-content {
            padding: 25px;
        }

        .blog-category {
            display: inline-block;
            padding: 5px 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            font-size: 0.85em;
            margin-bottom: 15px;
        }

        .blog-title {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: #333;
        }

        .blog-description {
            color: #666;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .blog-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .read-more {
            color: #667eea;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .read-more:hover {
            color: #764ba2;
            transform: translateX(5px);
            display: inline-block;
        }

        .likes {
            color: #999;
            font-size: 0.9em;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }
            
            .blog-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐾 Purrfect Paws</h1>
            <p>Discover the wonderful world of cat breeds</p>
        </header>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search for cat breeds...">
            <span class="search-icon">🔍</span>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All Breeds</button>
            <button class="filter-btn" data-filter="long-hair">Long Hair</button>
            <button class="filter-btn" data-filter="short-hair">Short Hair</button>
            <button class="filter-btn" data-filter="exotic">Exotic</button>
        </div>

        <div class="blog-grid" id="blogGrid"></div>
    </div>

    <script>
        const blogPosts = [
            {
                id: 1,
                title: "Persian Cats: The Elegant Companion",
                category: "long-hair",
                description: "Known for their luxurious long coats and sweet personalities, Persian cats are one of the most popular breeds worldwide. They're gentle, affectionate, and love being pampered.",
                image: "https://hips.hearstapps.com/hmg-prod/images/persian-cat-1674755952.jpg",
                likes: "2.3k"
            },
            {
                id: 2,
                title: "Siamese: The Vocal Aristocrat",
                category: "short-hair",
                description: "Siamese cats are famous for their striking blue eyes, distinctive color points, and incredibly vocal nature. They're intelligent, social, and form strong bonds with their owners.",
                image: "https://www.purina.co.uk/sites/default/files/2022-07/Siamese%20Cat.jpg",
                likes: "1.8k"
            },
            {
                id: 3,
                title: "Maine Coon: The Gentle Giant",
                category: "long-hair",
                description: "One of the largest domestic cat breeds, Maine Coons are known for their impressive size, tufted ears, and friendly disposition. They're adaptable, playful, and great with families.",
                image: "https://www.purina.co.uk/sites/default/files/2022-06/Maine-Coon-Cat.jpg",
                likes: "3.1k"
            },
            {
                id: 4,
                title: "Bengal: The Wild Beauty",
                category: "exotic",
                description: "With their leopard-like spots and energetic personality, Bengals bring a touch of the wild into your home. They're athletic, intelligent, and love interactive play.",
                image: "https://www.thesprucepets.com/thmb/KqrZGniYYHYOUMuOJdXxaEGPIy8=/2119x0/filters:no_upscale():strip_icc()/GettyImages-1189893683-e6309cb00a30453faf6103ebd67c74db.jpg",
                likes: "2.7k"
            },
            {
                id: 5,
                title: "British Shorthair: The Teddy Bear",
                category: "short-hair",
                description: "With their plush coats and round faces, British Shorthairs resemble living teddy bears. They're calm, easygoing, and make perfect indoor companions.",
                image: "https://www.purina.co.uk/sites/default/files/2022-06/British-Shorthair-Cat.jpg",
                likes: "2.0k"
            },
            {
                id: 6,
                title: "Sphynx: The Hairless Wonder",
                category: "exotic",
                description: "Despite their lack of fur, Sphynx cats are warm to the touch and incredibly affectionate. They're extroverted, energetic, and love being the center of attention.",
                image: "https://www.thesprucepets.com/thmb/8FPDkD4jTyXJdKDlLvbvLHZYp_I=/2121x0/filters:no_upscale():strip_icc()/sphynx-cat-on-blue-background-997062808-5c8ca89dc9e77c00011c5836.jpg",
                likes: "1.5k"
            },
            {
                id: 7,
                title: "Ragdoll: The Floppy Friend",
                category: "long-hair",
                description: "Named for their tendency to go limp when picked up, Ragdolls are known for their docile temperament and striking blue eyes. They're affectionate lap cats who follow their owners everywhere.",
                image: "https://www.purina.co.uk/sites/default/files/2022-07/Ragdoll.jpg",
                likes: "2.9k"
            },
            {
                id: 8,
                title: "Scottish Fold: The Adorable Ears",
                category: "short-hair",
                description: "Recognizable by their unique folded ears, Scottish Folds have sweet, rounded faces and gentle personalities. They're adaptable, affectionate, and get along well with children and other pets.",
                image: "https://www.purina.co.uk/sites/default/files/2022-07/Scottish%20Fold.jpg",
                likes: "2.5k"
            },
            {
                id: 9,
                title: "Russian Blue: The Silver Shadow",
                category: "short-hair",
                description: "With their shimmering blue-grey coat and emerald eyes, Russian Blues are elegant and reserved. They're loyal to their families but can be shy around strangers.",
                image: "https://www.purina.co.uk/sites/default/files/2022-07/Russian%20Blue.jpg",
                likes: "1.9k"
            }
        ];

        function renderBlogPosts(posts) {
            const blogGrid = document.getElementById('blogGrid');
            blogGrid.innerHTML = '';
            
            posts.forEach(post => {
                const card = document.createElement('div');
                card.className = 'blog-card';
                card.innerHTML = `
                    <img src="${post.image}" alt="${post.title}" class="blog-image">
                    <div class="blog-content">
                        <span class="blog-category">${post.category.replace('-', ' ').toUpperCase()}</span>
                        <h3 class="blog-title">${post.title}</h3>
                        <p class="blog-description">${post.description}</p>
                        <div class="blog-footer">
                            <a href="#" class="read-more">Read More →</a>
                            <span class="likes">❤️ ${post.likes}</span>
                        </div>
                    </div>
                `;
                blogGrid.appendChild(card);
            });
        }

        // Filter functionality
        const filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const filter = btn.dataset.filter;
                if (filter === 'all') {
                    renderBlogPosts(blogPosts);
                } else {
                    const filtered = blogPosts.filter(post => post.category === filter);
                    renderBlogPosts(filtered);
                }
            });
        });

        // Search functionality
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = blogPosts.filter(post => 
                post.title.toLowerCase().includes(searchTerm) ||
                post.description.toLowerCase().includes(searchTerm)
            );
            renderBlogPosts(filtered);
        });

        // Initial render
        renderBlogPosts(blogPosts);
    </script>
</body>
</html>
